name: Deploy Staging

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy (staging)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # En mode sftp_only, l'action de déploiement ne crée pas le dossier
      # distant. Sur le mutualisé OVH, la session SFTP atterrit dans le home du
      # compte : le dossier web `www` est un chemin RELATIF (le chemin absolu
      # `/www` n'existe pas). On crée donc `www/staging` en relatif (le `-`
      # devant mkdir ignore l'erreur si le dossier existe déjà).
      - name: Ensure remote staging directory exists
        env:
          SFTP_HOST: ${{ secrets.OVH_SFTP_HOST }}
          SFTP_USER: ${{ secrets.OVH_SFTP_USER }}
          SFTP_PASS: ${{ secrets.OVH_SFTP_PASSWORD }}
          SFTP_PORT: ${{ secrets.OVH_SFTP_PORT }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
          sshpass -p "$SFTP_PASS" sftp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o BatchMode=no -P "$SFTP_PORT" "$SFTP_USER@$SFTP_HOST" <<'EOF'
          -mkdir www/staging
          bye
          EOF

      # DIAGNOSTIC TEMPORAIRE — inspecter la nature de `www` (dossier ? symlink ?)
      # et le contenu du home OVH, pour comprendre l'echec d'upload prod.
      - name: DIAG remote layout
        env:
          SFTP_HOST: ${{ secrets.OVH_SFTP_HOST }}
          SFTP_USER: ${{ secrets.OVH_SFTP_USER }}
          SFTP_PASS: ${{ secrets.OVH_SFTP_PASSWORD }}
          SFTP_PORT: ${{ secrets.OVH_SFTP_PORT }}
        run: |
          sshpass -p "$SFTP_PASS" sftp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o BatchMode=no -P "$SFTP_PORT" "$SFTP_USER@$SFTP_HOST" <<'EOF'
          pwd
          ls -la
          ls -la www
          ls -la www/staging
          EOF

      - name: Deploy to OVH (staging) via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.OVH_SFTP_HOST }}
          username: ${{ secrets.OVH_SFTP_USER }}
          password: ${{ secrets.OVH_SFTP_PASSWORD }}
          port: ${{ secrets.OVH_SFTP_PORT }}
          local_path: './dist/*'
          remote_path: 'www/staging/'
          sftp_only: true

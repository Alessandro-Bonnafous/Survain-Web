name: Deploy Staging

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy (staging)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # En mode sftp_only, l'action de déploiement ne crée pas le dossier
      # distant. On s'assure donc que /www/staging existe (le `-` devant mkdir
      # ignore l'erreur si le dossier est déjà présent).
      - name: Ensure remote staging directory exists
        env:
          SFTP_HOST: ${{ secrets.OVH_SFTP_HOST }}
          SFTP_USER: ${{ secrets.OVH_SFTP_USER }}
          SFTP_PASS: ${{ secrets.OVH_SFTP_PASSWORD }}
          SFTP_PORT: ${{ secrets.OVH_SFTP_PORT }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
          printf '%s\n' '-mkdir /www/staging' | sshpass -p "$SFTP_PASS" \
            sftp -P "$SFTP_PORT" -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null -b - "$SFTP_USER@$SFTP_HOST"

      - name: Deploy to OVH (staging) via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server: ${{ secrets.OVH_SFTP_HOST }}
          username: ${{ secrets.OVH_SFTP_USER }}
          password: ${{ secrets.OVH_SFTP_PASSWORD }}
          port: ${{ secrets.OVH_SFTP_PORT }}
          local_path: './dist/*'
          remote_path: '/www/staging/'
          sftp_only: true
